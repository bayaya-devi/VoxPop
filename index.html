<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxPop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f3f0 0%, #e8e3dc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ========== SPLASH SCREEN ========== */
        #splash {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #f5f3f0 0%, #e8e3dc 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .logo {
            position: relative;
            font-size: 100px;
            font-weight: bold;
            height: 120px;
            width: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .letter {
            position: absolute;
            transition: all 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            opacity: 0;
        }

        .letter.v {
            left: calc(50% - 200px);
            color: #5a5248;
        }

        .letter.p {
            left: calc(50% + 130px);
            color: #7a6f5d;
        }

        /* Après animate : les lettres glissent vers le centre */
        .logo.animate .letter.v {
            left: calc(50% - 90px);
            opacity: 1;
        }

        .logo.animate .letter.p {
            left: calc(50% + 20px);
            opacity: 1;
        }

        /* Après show-full : V devient Vox, P devient Pop */
        .logo.show-full .letter.v::after {
            content: "ox";
            font-size: 60px;
            vertical-align: middle;
            color: #5a5248;
        }

        .logo.show-full .letter.p::after {
            content: "op";
            font-size: 60px;
            vertical-align: middle;
            color: #7a6f5d;
        }

        /* Transition de sortie */
        #splash.fadeout {
            opacity: 0;
            transition: opacity 0.8s ease;
        }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo" id="logo">
            <span class="letter v">V</span>
            <span class="letter p">P</span>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const splash = document.getElementById('splash');
            const logo  = document.getElementById('logo');

            // Étape 1 : V et P glissent vers le centre
            setTimeout(() => {
                logo.classList.add('animate');
            }, 300);

            // Étape 2 : V → Vox, P → Pop
            setTimeout(() => {
                logo.classList.add('show-full');
            }, 1500);

            // Étape 3 : fondu de sortie
            setTimeout(() => {
                splash.classList.add('fadeout');
            }, 3000);

            // Étape 4 : redirection vers acceuil.html
            setTimeout(() => {
                window.location.href = 'acceuil.html';
            }, 3800);
        });
    </script>

</body>
</html>
